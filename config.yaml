# ============================================================
# 投资主线 —— LLM 给每条信息打标签时从这里选
# ============================================================
themes:
  - { key: "compute_demand",        name: "算力需求",        desc: "云厂capex、token消耗、推理/训练需求" }
  - { key: "chip_supply",           name: "芯片供给",        desc: "先进制程、晶圆产能、良率" }
  - { key: "advanced_packaging",    name: "先进封装与HBM",   desc: "CoWoS、HBM产能与定价" }
  - { key: "model_capability",      name: "模型能力曲线",    desc: "前沿模型能力、效率突破" }
  - { key: "ai_monetization",       name: "AI应用与变现",    desc: "AI产品收入、商业化进展" }
  - { key: "edge_ai",               name: "终端AI",          desc: "AI手机/PC/眼镜等终端" }
  - { key: "datacenter_power",      name: "数据中心与能源",  desc: "数据中心建设、电力供给" }
  - { key: "policy_export",         name: "政策与出口管制",  desc: "出口管制、补贴、监管" }
  - { key: "domestic_substitution", name: "国产替代",        desc: "国产算力链替代进程" }

# ============================================================
# 信源
# ============================================================
sources:
  tech:
    # ---- 学术 / 开源社区 ----
    - { id: "arxiv",           type: "arxiv",    params: { categories: ["cs.AI", "cs.CL", "cs.LG"], max: 60 } }
    - { id: "hackernews",      type: "hackernews", params: { story: "top", max: 50 } }
    - { id: "github_trending", type: "github_trending", params: { language: "", since: "daily", max: 25 } }
    # ---- 全球 AI 厂商官方 ----
    - { id: "rss:openai",      type: "rss", params: { url: "https://openai.com/blog/rss.xml" } }
    - { id: "rss:googleai",    type: "rss", params: { url: "https://blog.google/technology/ai/rss/" } }
    # Anthropic 无公开 RSS feed，已禁用
    # ---- 全球科技媒体(AI 专线) ----
    - { id: "rss:theverge-ai", type: "rss", params: { url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml" } }
    - { id: "rss:arstechnica", type: "rss", params: { url: "https://feeds.arstechnica.com/arstechnica/index" } }
    - { id: "rss:techcrunch-ai", type: "rss", params: { url: "https://techcrunch.com/category/artificial-intelligence/feed/" } }
    - { id: "rss:wired",       type: "rss", params: { url: "https://www.wired.com/feed/rss" } }
    - { id: "rss:mit-tr",      type: "rss", params: { url: "https://www.technologyreview.com/feed/" } }
    # ---- 厂商技术博客 ----
    - { id: "rss:nvidia-blog",     type: "rss", params: { url: "https://blogs.nvidia.com/feed/" } }
    - { id: "rss:msft-research",   type: "rss", params: { url: "https://www.microsoft.com/en-us/research/feed/" } }
    # ---- 技术社区 ----
    - { id: "rss:lobsters",        type: "rss", params: { url: "https://lobste.rs/rss" } }
    # ---- 科技媒体扩展 ----
    - { id: "rss:venturebeat-ai",  type: "rss", params: { url: "https://venturebeat.com/category/ai/feed/" } }
    - { id: "rss:ieee-spectrum-ai", type: "rss", params: { url: "https://spectrum.ieee.org/feeds/topic/artificial-intelligence.rss" } }
    # ---- 中文科技媒体 ----
    - { id: "rss:36kr",         type: "rss", params: { url: "https://www.36kr.com/feed" } }
    - { id: "rss:leiphone",     type: "rss", params: { url: "https://www.leiphone.com/feed" } }
    # ---- 国际科技媒体扩展 ----
    - { id: "rss:techmeme",     type: "rss", params: { url: "https://techmeme.com/feed.xml" } }
    - { id: "rss:tomshardware", type: "rss", params: { url: "https://www.tomshardware.com/feeds/all" } }
    - { id: "rss:zdnet",        type: "rss", params: { url: "https://www.zdnet.com/news/rss.xml" } }
    # CNBC Tech RSS 403 限制，暂时禁用
    # - { id: "rss:cnbc-tech",    type: "rss", params: { url: "https://www.cnbc.com/id/100003114/device/rss/rss.html" } }
    - { id: "rss:importai",     type: "rss", params: { url: "https://jack-clark.net/feed/" } }
    - { id: "rss:eetimes",      type: "rss", params: { url: "https://www.eetimes.com/feed/" } }
    - { id: "rss:infoq",        type: "rss", params: { url: "https://www.infoq.com/feed/" } }
    # ---- 中文科技媒体(视可用性启用) ----
    # 机器之心 RSS 需要登录 session，暂时禁用
    # - { id: "rss:jiqizhixin",  type: "rss", params: { url: "https://www.jiqizhixin.com/rss" } }
    # ---- X/Twitter（Nitter RSS 全线 403，暂时禁用。待 X API 方案） ----
    # Nitter 实例已全部失效，X/Twitter 内容暂由 minimax_search 搜索覆盖
    # ---- Reddit AI 社区（RSS feed） ----
    - { id: "reddit:ml",           type: "rss", params: { url: "https://www.reddit.com/r/MachineLearning/.rss" } }
    - { id: "reddit:localllama",   type: "rss", params: { url: "https://www.reddit.com/r/LocalLLaMA/.rss" } }
    - { id: "reddit:singularity",  type: "rss", params: { url: "https://www.reddit.com/r/singularity/.rss" } }
    # ---- HuggingFace Daily Papers（JSON API，公开可用） ----
    - { id: "huggingface:papers",  type: "huggingface_papers", params: { max: 20 } }
    # ---- MiniMax 联网搜索（Google 级搜索，替代 DDG） ----
    - { id: "minimax_search",  type: "minimax_search", params: { max_per_stock: 3 } }
    # ---- DuckDuckGo 搜索（备用，MiniMax 搜索失败时补充） ----
    - { id: "web_search",      type: "web_search", params: { max_per_stock: 1 } }
  market:
    - { id: "sec_edgar",       type: "sec_edgar", params: { forms: ["8-K"] } }

# ============================================================
# 趋势话题搜索 —— 追踪 AI 关键人物和话题（替代 X/Twitter）
# 通过 MiniMax 搜索 API 发现被新闻媒体覆盖的 X 级实时动态
# ============================================================
trending_topics:
  - "OpenAI latest news"
  - "Elon Musk AI"
  - "DeepSeek latest"
  - "Sam Altman announcement"
  - "Anthropic Claude release"
  - "马斯克 OpenAI 诉讼"
  - "Google DeepMind breakthrough"
  - "NVIDIA Jensen Huang announcement"
  - "xAI Grok latest"
  - "AI regulation policy latest"

# ============================================================
# 运行参数
# ============================================================
runtime:
  cron_interval_minutes: 30      # 建议 30min，首跑手动触发建立 seen.db 后增量跑仅需 3-5min
  rolling_window_hours: 8       # 只采集最近 N 小时内发布的内容
  situation_update_interval: 1      # 态势重写间隔(轮次)，每轮更新以最大化MiniMax用量
  situation_trigger_new_events: 1   # 触发态势重写的新事件数阈值

# ============================================================
# 事件聚类参数
# ============================================================
clustering:
  similarity_threshold: 0.85        # embedding 余弦相似度阈值
  max_active_events: 30             # 最多活跃事件数
  event_ttl_hours: 12               # 无更新则标记为 resolved（缩短以保持新鲜度）

# ============================================================
# 处理与输出参数
# ============================================================
scoring:
  min_score_to_keep: 5              # 第一段筛选阈值（降低以扩大覆盖面）
  max_items_in_brief: 80            # 晨报最多保留条目数

minimax:
  model: "MiniMax-M2.7"             # MiniMax M2.7 (Coding Plan)

output:
  timezone: "Asia/Hong_Kong"

# ============================================================
# 分发渠道
# ============================================================
channels:
  rss:
    enabled: true
    max_items: 50
  github_pages:
    enabled: true
  telegram:
    enabled: true
    notify_new_event_threshold: 7
    notify_direction_flip: true
    digest_interval_hours: 1
  github_issue:
    enabled: true
    label: "晨报"
    schedule_hour_hkt: 7
