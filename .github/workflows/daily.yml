name: radar-scan
on:
  schedule:
    - cron: "*/30 * * * *"        # 每 30 分钟（首跑需手动触发建立 seen.db）
  workflow_dispatch:
concurrency:
  group: radar-scan               # 防止重叠运行，新触发会排队
  cancel-in-progress: false
permissions:
  contents: write
  issues: write
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120           # 首跑 60-80min，增量跑 3-5min
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python main.py --stage full
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io/ai-research-radar', github.repository_owner) }}
      - name: commit state & archive
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add archive/ state/ pages/ README.md
          git commit -m "radar: $(date -u +%Y-%m-%dT%H:%M)" || echo "nothing to commit"
          # 三重试：防止 rebase 与 push 之间的竞态条件
          pushed=0
          for i in 1 2 3; do
            git pull --rebase origin main && git push && { pushed=1; break; }
            echo "push failed (attempt $i), retrying after 3s..."
            sleep 3
          done
          if [ $pushed -eq 0 ]; then
            echo "::error ::Failed to push after 3 attempts"
            exit 1
          fi
