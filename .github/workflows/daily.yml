name: radar-scan
on:
  schedule:
    - cron: "*/20 * * * *"        # 每 20 分钟
  workflow_dispatch:
concurrency:
  group: radar-scan               # 防止重叠运行
  cancel-in-progress: false
permissions:
  contents: write
  issues: write
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python main.py --stage full
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io/ai-research-radar', github.repository_owner) }}
      - name: commit state & archive
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add archive/ state/ pages/ README.md
          git commit -m "radar: $(date -u +%Y-%m-%dT%H:%M)" || echo "nothing to commit"
          git push
